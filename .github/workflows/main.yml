name: RKNN Convert Bot

on:
  workflow_dispatch: # 允许手动点击开始

jobs:
  convert:
    runs-on: ubuntu-latest # 使用 GitHub 的免费 Ubuntu 服务器
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.10'

      # 安装依赖
      - name: Install Dependencies
        run: |
          pip install numpy==1.26.4 onnx==1.16.0 onnxruntime==1.18.0 opencv-python
          # 自动下载并安装瑞芯微工具包
          git clone https://github.com/rockchip-linux/rknn-toolkit2.git
          pip install rknn-toolkit2/rknn-toolkit2/packages/rknn_toolkit2-2.3.0-cp310-cp310-linux_x86_64.whl

      # 运行转换脚本
      - name: Run Conversion
        run: python convert_script.py

      # 关键修复：升级到 v4 以解决弃用问题
      - name: Upload Result
        uses: actions/upload-artifact@v4 
        with:
          name: rknn-model
          path: yolo11n.rknn
