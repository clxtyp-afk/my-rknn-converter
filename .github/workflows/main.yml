name: RKNN Convert Bot

on:
  workflow_dispatch: 

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          # 1. 安装基础环境
          pip install numpy==1.26.4 onnx==1.16.0 onnxruntime==1.18.0 opencv-python
          
          # 2. 克隆官方转换工具仓库 (使用最新的 airockchip 仓库)
          git clone --depth 1 https://github.com/airockchip/rknn-toolkit2.git
          
          # 3. 【核心修复】自动寻找 requirements 文件并安装
          # 使用 find 命令在克隆下来的目录中查找符合 cp310 的 requirements 文件
          REQ_FILE=$(find rknn-toolkit2 -name "requirements_cp310-*.txt" | head -n 1)
          echo "找到依赖文件: $REQ_FILE"
          pip install -r "$REQ_FILE"
          
          # 4. 【核心修复】自动寻找 RKNN 工具包 (.whl) 并安装
          # 使用 find 命令自动匹配版本号，避免路径层级错误
          WHL_FILE=$(find rknn-toolkit2 -name "rknn_toolkit2-*-cp310-cp310-*.whl" | head -n 1)
          echo "找到工具包文件: $WHL_FILE"
          pip install "$WHL_FILE"

      - name: Run Conversion
        run: python convert_script.py

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: rknn-model
          path: yolo11n.rknn
